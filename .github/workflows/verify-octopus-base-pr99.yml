name: Verify Octopus Base PR99 Release Reusable

on:
  push:
    branches:
      - test/verify-octopus-base-pr99-skip-extra

jobs:
  verify:
    uses: octopusden/octopus-base/.github/workflows/common-java-gradle-release.yml@fix/release-skip-extra-tasks-contract
    with:
      flow-type: hybrid
      java-version: '11'
      commit-hash: ${{ github.sha }}
      build-version: 9.9.9-pr99
      docker-image: octopus-test
      skip-extra-tasks: "integrationTest; echo SHOULD_NOT_RUN"
      register-release-immediately: false
    secrets: inherit
