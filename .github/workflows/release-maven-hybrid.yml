name: Release Maven Hybrid

on:
  repository_dispatch:
    types: release-maven

jobs:
  release:
    uses: octopusden/octopus-base/.github/workflows/common-java-maven-release.yml@939bdf9b607a5cbcc80c1bed41dd44528b051ee4
    with:
      flow-type: hybrid
      java-version: '8'
      commit-hash: ${{ github.event.client_payload.commit }}
      build-version: ${{ github.event.client_payload.project_version }}
      register-release-immediately: true
    secrets: inherit
