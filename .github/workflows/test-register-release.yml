name: Test release registration

on:
  workflow_dispatch:
    inputs:
      octopus-repository:
        type: string
        required: true
      release-version:
        type: string
        required: true

jobs:
  build:
    uses: octopusden/octopus-base/.github/workflows/common-register-release.yml@ff80643474de6513cd1c1d538c41438c3d5cf177
    with:
      octopus-repository: ${{ inputs.octopus-repository }}
      release-version:  ${{ inputs.release-version }}
    secrets: inherit
