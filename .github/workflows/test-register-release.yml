name: Test release registration

on:
  workflow_dispatch:
    inputs:
      octopus-repository:
        type: string
        required: true
      release-version:
        type: string
        required: true

jobs:
  build:
    uses: octopusden/octopus-base/.github/workflows/common-register-release.yml@939bdf9b607a5cbcc80c1bed41dd44528b051ee4
    with:
      octopus-repository: ${{ inputs.octopus-repository }}
      release-version:  ${{ inputs.release-version }}
    secrets: inherit
