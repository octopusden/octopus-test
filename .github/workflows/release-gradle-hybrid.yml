name: Release Gradle Hybrid

on:
  repository_dispatch:
    types: release

jobs:
  release:
    uses: octopusden/octopus-base/.github/workflows/common-java-gradle-release.yml@77563d7955837e048b2e1e74a1713e68d91d82b1
    with:
      flow-type: hybrid
      java-version: '11' 
      commit-hash: ${{ github.event.client_payload.commit }}
      build-version: ${{ github.event.client_payload.project_version }}
      register-release-immediately: true
    secrets: inherit
