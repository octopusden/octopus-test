name: Check for artifact and register release

on:
  workflow_run:
    workflows: ["Release Gradle Hybrid"]
    types:
      - completed

jobs:
  build:
    uses: octopusden/octopus-base/.github/workflows/common-check-and-register-release.yml@ff80643474de6513cd1c1d538c41438c3d5cf177
    if:  "${{ github.event.workflow_run.conclusion == 'success' }}"
    with:
      artifact-pattern: "octopus-test/_VER_/octopus-test-_VER_.jar"
    secrets: inherit
